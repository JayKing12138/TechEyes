# Redis persistence config for TechEyes
# Enable BOTH RDB snapshots and AOF append logs.
# This file is mounted into the Docker container at:
#   /usr/local/etc/redis/redis.conf
# Data is written to the named Docker volume: techeyes_redis_data -> /data

# -------------------- 网络 --------------------
bind 0.0.0.0
port 6379
# 容器内部运行，无需 protected-mode（外部通过 Docker 网络隔离）
protected-mode no
tcp-backlog 511
tcp-keepalive 300

# -------------------- 基础 --------------------
loglevel notice
databases 16

# 持久化文件目录（映射到 Docker named volume: techeyes_redis_data）
dir /data

# -------------------- RDB --------------------
# 快照规则：X 秒内发生 Y 次写操作时触发 dump.rdb
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
# RDB 后台保存失败时拒绝写入，防止静默数据丢失
stop-writes-on-bgsave-error yes

# -------------------- AOF --------------------
# 开启追加日志（每次写入都记录，宕机最多丢失 1 秒数据）
appendonly yes
appendfilename "appendonly.aof"
# Redis 7.0+ Multi-Part AOF 目录
appenddirname "appendonlydir"
# everysec: 每秒 fsync，兼顾性能与安全
appendfsync everysec
# AOF 重写期间不跳过 fsync，保证重写过程中不丢数据
no-appendfsync-on-rewrite no
# AOF 文件增长超过上次重写大小 100% 时自动触发重写
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
# AOF 启动时损坏尾部数据自动截断（比拒绝启动更安全）
aof-load-truncated yes

# -------------------- 混合持久化 --------------------
# RDB preamble + AOF 增量，重启更快且更安全
aof-use-rdb-preamble yes

# -------------------- 惰性释放 --------------------
# 大 key 删除/过期异步执行，避免主线程阻塞
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes

# -------------------- 内存（可选）--------------------
# 生产建议根据容器限制设置；开发时留空（不限制）
# maxmemory 512mb
# maxmemory-policy allkeys-lru

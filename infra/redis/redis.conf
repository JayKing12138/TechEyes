# Redis persistence config for TechEyes
# Enable BOTH RDB snapshots and AOF append logs.

bind 0.0.0.0
port 6379

# Persist files under mounted docker volume
# /data is mapped to named volume: redis_data
dir /data

# -------------------- RDB --------------------
# Snapshot rules: if X seconds and at least Y writes happened, create dump.rdb
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb

# -------------------- AOF --------------------
appendonly yes
appendfilename "appendonly.aof"
appenddirname "appendonlydir"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# AOF + RDB preamble for faster restart and safer recovery
aof-use-rdb-preamble yes

# Keep default data safety behavior
stop-writes-on-bgsave-error yes

# Optional memory behavior (left unlimited by default)
# maxmemory 0
# maxmemory-policy noeviction
